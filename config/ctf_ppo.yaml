behaviors:
  CTFAgent:                         
    trainer_type: ppo              
    max_steps: 10000000           
    time_horizon: 128               
    summary_freq: 10000            
    keep_checkpoints: 5             
    hyperparameters:
      batch_size: 2048              
      buffer_size: 204800            
      learning_rate: 3.0e-4
      learning_rate_schedule: linear  
      beta: 0.01                  
      epsilon: 0.2                  
      lambd: 0.95                   
      num_epoch: 3                  
    network_settings:
      normalize: true               
      hidden_units: 256             
      num_layers: 3                 
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99                 
        strength: 1.0
