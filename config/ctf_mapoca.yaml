behaviors:
  CTFAgent:                         # must match Behavior Name in Unity Inspector
    trainer_type: poca              # MA-POCA — centralised critic, shared team reward
    max_steps: 10000000           # total env steps across all agents combined
    time_horizon: 128               # steps collected per agent before updating
    summary_freq: 10000            # how often stats are written to TensorBoard
    keep_checkpoints: 5             # number of model checkpoints to keep
    hyperparameters:
      batch_size: 2048              
      buffer_size: 20480            
      learning_rate: 3.0e-4
      learning_rate_schedule: linear  # decays to 0 over max_steps
      beta: 5.0e-4                  # entropy coefficient — keeps exploration alive
      epsilon: 0.2                  # PPO clip range
      lambd: 0.95                   # GAE lambda — balance bias vs variance
      num_epoch: 3                  # passes over the buffer per update
    network_settings:
      normalize: true               # normalises observations — important for mixed
      hidden_units: 256             # neurons per layer
      num_layers: 2                 # deeper = more capacity, slower to train
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99                 # discount — high because captures are rare
        strength: 1.0
