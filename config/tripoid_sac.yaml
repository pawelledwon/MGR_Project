behaviors:
  TripoidAgent:
    trainer_type: sac
    hyperparameters:
      learning_rate: 3.0e-4
      learning_rate_schedule: constant
      batch_size: 256          
      buffer_size: 200000      
      buffer_init_steps: 2000  
      tau: 0.005               
      steps_per_update: 5      
      save_replay_buffer: false
      init_entcoef: 0.1      
      reward_signal_steps_per_update: 1
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000
    time_horizon: 512
    summary_freq: 10000